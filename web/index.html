<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="application-name" content="Rural Health Care Dashboard" />
    <meta name="theme-color" content="#08111d" />
    <meta
      name="description"
      content="Rural health dashboard for patient intake, lab investigation, analysis, backend processing, and model review."
    />
    <meta
      property="og:title"
      content="Rural Health Care Dashboard"
    />
    <meta
      property="og:description"
      content="Preview the end-to-end rural health workflow with patient intake, model analysis, backend processing, and trained model review."
    />
    <meta property="og:type" content="website" />
    <title>Rural Health Care Dashboard</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at top left, rgba(114, 215, 255, 0.16), transparent 26%),
          radial-gradient(circle at top right, rgba(156, 241, 210, 0.12), transparent 24%),
          linear-gradient(180deg, #06101b 0%, #0a1524 50%, #060b14 100%);
        color: #edf3fb;
        font-family: "Aptos", "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
      }

      #root {
        width: 100%;
        min-height: 100vh;
      }

      .preview-shell {
        width: min(960px, calc(100vw - 32px));
        margin: 24px auto;
        padding: 28px;
        border: 1px solid rgba(185, 201, 225, 0.16);
        border-radius: 28px;
        background: linear-gradient(180deg, rgba(20, 32, 53, 0.95), rgba(9, 16, 29, 0.97));
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.44);
      }

      .preview-shell h1 {
        margin: 0 0 10px;
        font-size: clamp(2rem, 4vw, 3.4rem);
        line-height: 0.98;
        letter-spacing: -0.04em;
      }

      .preview-eyebrow {
        margin: 0 0 10px;
        color: #72d7ff;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        font-size: 0.74rem;
      }

      .preview-shell p {
        margin: 0;
        color: #a2b4cb;
        line-height: 1.65;
      }

      .preview-shell__meta {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 18px;
      }

      .preview-pill {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid rgba(185, 201, 225, 0.16);
        background: rgba(255, 255, 255, 0.04);
        color: #edf3fb;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <main class="preview-shell" aria-label="Dashboard preview">
        <p class="preview-eyebrow">Web preview</p>
        <h1>Rural Health Care Dashboard</h1>
        <p>
          Loading the patient workflow, comparison views, pipeline timeline, and model hub. Open the app to review the
          complete flow once the dashboard mounts.
        </p>
        <div class="preview-shell__meta" aria-hidden="true">
          <span class="preview-pill">Patient intake</span>
          <span class="preview-pill">Comparative analysis</span>
          <span class="preview-pill">Backend processing</span>
          <span class="preview-pill">ML and DL hub</span>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
